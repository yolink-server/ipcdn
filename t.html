<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流光效果</title>
    <style>
        .image-container {
            position: relative;
            width: 300px;
            height: 200px;
            overflow: hidden; /* 防止渐变超出容器 */
        }

        .image-container img {
            display: block;
            width: 100%;
            height: 100%;
            /* 设置图片不透明部分的遮罩 */
            -webkit-mask-image: url('img/logo420b.png'); /* 请替换为你的图片地址 */
            mask-image: url('img/logo420b.png'); /* 兼容不同浏览器 */
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            /* 增加遮罩层 */
            background-image: linear-gradient(90deg, #215b91 10%, #0e789c 20%, #0b8481 25%, #198247 37.5%, #5d944a 50%, #198247 62.5%, #0b8481 75%, #0e789c 87.5%, #215b91 );
            background-size: 200%; /* 设置背景范围，超出容器 */
            animation: shine 5s linear infinite;
        }

        @keyframes shine  {
            0%{
                background-position: -200%;
            }
            100% {
                 background-position: 200%;
            }
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img/>
    </div>
</body>
</html>
